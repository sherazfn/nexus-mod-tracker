name: Backfill BG3

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max mod_ids to probe this run (2 API calls each)"
        required: false
        default: "1000"
  schedule:
    # Daily at 13:17 UTC — staggered well clear of the main scrape (06:37).
    # Each run probes ~1000 IDs (~2000 API calls) so it stays under the
    # 2500/day Nexus limit. Stops automatically once max_id is reached.
    - cron: "17 13 * * *"

permissions:
  contents: write

concurrency:
  group: "scrape-deploy"
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Backfill BG3 (chunked)
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          python -m scripts.backfill \
            --slug baldursgate3 \
            --limit "${{ github.event.inputs.limit || '1000' }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: BG3 backfill chunk [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git pull --rebase origin main
            git push
          fi
